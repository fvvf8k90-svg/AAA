<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invest Pro</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:30px;
font-weight:bold;
color:#22c55e;
}

.hero{
padding:100px 20px;
text-align:center;
}

.hero h1{
font-size:55px;
}

.hero p{
font-size:22px;
color:#cbd5e1;
}

button{
padding:15px 35px;
font-size:20px;
background:#22c55e;
border:none;
border-radius:12px;
color:white;
cursor:pointer;
margin-top:20px;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:40px;
}

.card{
background:#1e293b;
padding:25px;
width:280px;
border-radius:20px;
text-align:center;
}

footer{
background:#111827;
padding:20px;
text-align:center;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<div class="logo">
Invest Pro
</div>

<button>
Login
</button>

</header>

<section class="hero">

<h1>
منصة استثمار احترافية
</h1>

<p>
ابدأ الاستثمار وتحقيق الأرباح اليومية بسهولة
</p>

<button>
ابدأ الآن
</button>

</section>

<section class="cards">

<div class="card">

<h2>
الخطة البرونزية
</h2>

<p>
ربح يومي 5%
</p>

</div>

<div class="card">

<h2>
الخطة الفضية
</h2>

<p>
ربح يومي 10%
</p>

</div>

<div class="card">

<h2>
الخطة الذهبية
</h2>

<p>
ربح يومي 15%
</p>

</div>

</section>

<footer>

© 2025 Invest Pro

</footer>

</body>

</html>
