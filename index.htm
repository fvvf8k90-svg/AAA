<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>موقعي</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#111;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      text-align:center;
    }

    .box{
      padding:40px;
      border-radius:20px;
      background:#1e1e1e;
      box-shadow:0 0 20px rgba(0,0,0,.5);
    }

    h1{
      color:#00d4ff;
      font-size:40px;
    }

    p{
      font-size:20px;
      color:#ccc;
    }

    button{
      margin-top:20px;
      padding:12px 25px;
      border:none;
      border-radius:10px;
      background:#00d4ff;
      color:black;
      font-size:18px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>أهلاً بك 🌟</h1>
    <p>هذا أول موقع أرفعه على الإنترنت</p>

    <button onclick="alert('اشتغل الموقع بنجاح 🎉')">
      اضغط هنا
    </button>
  </div>

</body>
</html>
