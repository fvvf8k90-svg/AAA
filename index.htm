<!DOCTYPE html>
<html lang="ar">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invest Pro</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

header{
background:#111827;
padding:20px;
font-size:32px;
font-weight:bold;
}

.hero{
padding:60px 20px;
}

.hero h1{
font-size:42px;
}

.hero p{
font-size:20px;
color:#cbd5e1;
}

button{
padding:15px 35px;
font-size:18px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
margin-top:20px;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:30px;
}

.card{
background:#1e293b;
padding:25px;
width:250px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card h2{
color:#22c55e;
}

.stats{
padding:40px;
background:#111827;
}

.stat-number{
font-size:40px;
color:#22c55e;
}

.contact{
padding:40px;
}

footer{
background:#111827;
padding:20px;
margin-top:30px;
color:#94a3b8;
}

a{
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<header>
Invest Pro
</header>

<section class="hero">

<h1>استثمر بأمان وحقق أرباحك</h1>

<p>
منصة استثمار حديثة وسريعة للمستثمرين
</p>

<button onclick="joinNow()">
ابدأ الآن
</button>

<p id="msg"></p>

</section>

<section class="cards">

<div class="card">
<h2>الخطة البرونزية</h2>
<p>ربح يومي 5%</p>
</div>

<div class="card">
<h2>الخطة الفضية</h2>
<p>ربح يومي 10%</p>
</div>

<div class="card">
<h2>الخطة الذهبية</h2>
<p>ربح يومي 15%</p>
</div>

</section>

<section class="stats">

<h1>إحصائيات المنصة</h1>

<div class="stat-number" id="users">
1200
</div>

<p>مستخدم نشط</p>

</section>

<section class="contact">

<h1>تواصل معنا</h1>

<button>
<a href="https://wa.me/0000000000">
واتساب
</a>
</button>

</section>

<footer>
© 2025 Invest Pro
</footer>

<script>

function joinNow(){

document.getElementById("msg").innerHTML =
"تم تسجيل الدخول بنجاح";

}

</script>

</body>
</html>
