<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch Pro</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
color:#22c55e;
}

.container{
padding:20px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:#1e293b;
width:320px;
border-radius:20px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

video{
width:100%;
}

.info{
padding:15px;
}

.info h2{
margin:0;
margin-bottom:10px;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
Watch Pro
</header>

<div class="container">

<div class="card">

<video controls>
<source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<div class="info">

<h2>
فيديو تجريبي
</h2>

<p>
مشاهدة بجودة عالية
</p>

<button>
مشاهدة الآن
</button>

</div>

</div>

<div class="card">

<video controls>
<source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
</video>

<div class="info">

<h2>
فيديو ثاني
</h2>

<p>
بث سريع واحترافي
</p>

<button>
ابدأ المشاهدة
</button>

</div>

</div>

</div>

</body>

</html>
